<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Perfect Week</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: Georgia, 'Times New Roman', serif;
    }
    .font-serif {
      font-family: Georgia, 'Times New Roman', serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Simple SVG icons
    const Check = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    );

    const X = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    );

    const Award = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <circle cx="12" cy="8" r="7"></circle>
        <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline>
      </svg>
    );

    const Calendar = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
    );

    const TrendingUp = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
        <polyline points="17 6 23 6 23 12"></polyline>
      </svg>
    );

    const Gift = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="20 12 20 22 4 22 4 12"></polyline>
        <rect x="2" y="7" width="20" height="5"></rect>
        <line x1="12" y1="22" x2="12" y2="7"></line>
        <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path>
        <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
      </svg>
    );

    const Edit2 = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
      </svg>
    );

    const Plus = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    );

    const Trash2 = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
    );

    function PerfectWeekTracker() {
      const [tasks, setTasks] = useState({
        practice: { label: 'Practice 10+ hours', completed: false, type: 'counter', target: 10, current: 0 },
        lessons: { label: 'Teach all scheduled lessons', completed: false, type: 'checkbox' },
        laundry: { label: 'Do laundry before emergency', completed: false, type: 'checkbox' },
        groceries: { label: 'Grocery shop / meal prep', completed: false, type: 'checkbox' },
        bills: { label: 'Pay bills on time', completed: false, type: 'checkbox' },
        texts: { label: 'Respond to texts within 24hrs', completed: false, type: 'checkbox' },
        exercise: { label: 'Move body 4+ days', completed: false, type: 'counter', target: 4, current: 0 },
        thesis: { label: 'Work on thesis', completed: false, type: 'checkbox' },
        litterBox: { label: 'Clean litter box daily', completed: false, type: 'counter', target: 7, current: 0 },
        finances: { label: 'Log income/expenses', completed: false, type: 'checkbox' },
        social: { label: 'Reach out to one friend', completed: false, type: 'checkbox' },
        sleep: { label: 'Sleep before 2am (5+ nights)', completed: false, type: 'counter', target: 5, current: 0 }
      });

      const [weekData, setWeekData] = useState({
        weekNumber: 0,
        perfectWeeks: 0,
        currentStreak: 0,
        longestStreak: 0,
        mulligansUsed: 0,
        weekStartDate: '',
        prizesEarned: [],
        weeklyGoal: '',
        weeklyGoalCompleted: false
      });

      const [showPrizeModal, setShowPrizeModal] = useState(false);
      const [selectedPrize, setSelectedPrize] = useState('');
      const [editMode, setEditMode] = useState(false);
      const [showAddTask, setShowAddTask] = useState(false);
      const [editingTask, setEditingTask] = useState(null);
      const [newTask, setNewTask] = useState({
        label: '',
        type: 'checkbox',
        target: 1
      });

      const [prizes, setPrizes] = useState([
        { id: 1, name: 'New guitar strings & picks', cost: 1 },
        { id: 2, name: 'Fancy coffee shop visit', cost: 1 },
        { id: 3, name: 'New book', cost: 2 },
        { id: 4, name: 'Vinyl record', cost: 2 },
        { id: 5, name: 'Night out budget boost', cost: 2 },
        { id: 6, name: 'Nice dinner', cost: 3 },
        { id: 7, name: 'Small gear upgrade', cost: 5 },
        { id: 8, name: 'Free unproductive Sunday', cost: 1 }
      ]);

      const [editPrizeMode, setEditPrizeMode] = useState(false);
      const [showAddPrize, setShowAddPrize] = useState(false);
      const [editingPrize, setEditingPrize] = useState(null);
      const [newPrize, setNewPrize] = useState({ name: '', cost: 1 });

      useEffect(() => {
        const savedTasks = localStorage.getItem('perfect-week-tasks');
        const savedWeekData = localStorage.getItem('perfect-week-data');
        const savedPrizes = localStorage.getItem('perfect-week-prizes');
        
        if (savedTasks) {
          setTasks(JSON.parse(savedTasks));
        }
        if (savedWeekData) {
          setWeekData(JSON.parse(savedWeekData));
        }
        if (savedPrizes) {
          setPrizes(JSON.parse(savedPrizes));
        }
      }, []);

      const saveTasks = (newTasks) => {
        setTasks(newTasks);
        localStorage.setItem('perfect-week-tasks', JSON.stringify(newTasks));
      };

      const saveWeekData = (newData) => {
        setWeekData(newData);
        localStorage.setItem('perfect-week-data', JSON.stringify(newData));
      };

      const savePrizes = (newPrizes) => {
        setPrizes(newPrizes);
        localStorage.setItem('perfect-week-prizes', JSON.stringify(newPrizes));
      };

      const toggleTask = (taskId) => {
        const task = tasks[taskId];
        if (task.type === 'counter') return;
        
        const newTasks = {
          ...tasks,
          [taskId]: {
            ...task,
            completed: !task.completed
          }
        };
        saveTasks(newTasks);
      };

      const updateCounter = (taskId, delta) => {
        const task = tasks[taskId];
        const newCurrent = Math.max(0, Math.min(task.target, task.current + delta));
        const newTasks = {
          ...tasks,
          [taskId]: {
            ...task,
            current: newCurrent,
            completed: newCurrent >= task.target
          }
        };
        saveTasks(newTasks);
      };

      const getCompletionRate = () => {
        const taskArray = Object.values(tasks);
        const completed = taskArray.filter(t => t.completed).length;
        const total = taskArray.length;
        return {
          completed,
          total,
          percentage: Math.round((completed / total) * 100)
        };
      };

      const isPerfectWeek = () => {
        const allTasksComplete = Object.values(tasks).every(t => t.completed);
        return allTasksComplete && weekData.weeklyGoalCompleted;
      };

      const completeWeek = () => {
        const perfect = isPerfectWeek();
        
        if (perfect) {
          const newData = {
            ...weekData,
            perfectWeeks: weekData.perfectWeeks + 1,
            currentStreak: weekData.currentStreak + 1,
            longestStreak: Math.max(weekData.longestStreak, weekData.currentStreak + 1),
            weekNumber: weekData.weekNumber + 1,
            weekStartDate: new Date().toISOString(),
            mulligansUsed: 0,
            weeklyGoalCompleted: false
          };
          saveWeekData(newData);
          setShowPrizeModal(true);
        } else {
          const newData = {
            ...weekData,
            currentStreak: 0,
            weekNumber: weekData.weekNumber + 1,
            weekStartDate: new Date().toISOString(),
            weeklyGoalCompleted: false
          };
          saveWeekData(newData);
        }
        
        const resetTasks = Object.keys(tasks).reduce((acc, key) => {
          const task = tasks[key];
          acc[key] = { 
            ...task, 
            completed: false,
            ...(task.type === 'counter' ? { current: 0 } : {})
          };
          return acc;
        }, {});
        saveTasks(resetTasks);
      };

      const useMulligan = (taskId) => {
        if (weekData.mulligansUsed >= 1) {
          alert('You can only use one mulligan per month!');
          return;
        }
        
        const newTasks = {
          ...tasks,
          [taskId]: {
            ...tasks[taskId],
            completed: true
          }
        };
        saveTasks(newTasks);
        
        saveWeekData({
          ...weekData,
          mulligansUsed: weekData.mulligansUsed + 1
        });
      };

      const claimPrize = () => {
        if (!selectedPrize) return;
        
        const prize = prizes.find(p => p.id === parseInt(selectedPrize));
        if (!prize) return;
        
        if (weekData.perfectWeeks < prize.cost) {
          alert(`You need ${prize.cost} perfect week${prize.cost > 1 ? 's' : ''} for this prize!`);
          return;
        }
        
        const newData = {
          ...weekData,
          perfectWeeks: weekData.perfectWeeks - prize.cost,
          prizesEarned: [...weekData.prizesEarned, {
            name: prize.name,
            date: new Date().toISOString(),
            cost: prize.cost
          }]
        };
        saveWeekData(newData);
        setShowPrizeModal(false);
        setSelectedPrize('');
      };

      const addTask = () => {
        if (!newTask.label.trim()) {
          alert('Please enter a task name');
          return;
        }
        
        const taskId = 'task_' + Date.now();
        const newTasks = {
          ...tasks,
          [taskId]: {
            label: newTask.label,
            completed: false,
            type: newTask.type,
            ...(newTask.type === 'counter' ? { target: newTask.target, current: 0 } : {})
          }
        };
        saveTasks(newTasks);
        setNewTask({ label: '', type: 'checkbox', target: 1 });
        setShowAddTask(false);
      };

      const deleteTask = (taskId) => {
        if (!confirm('Delete this task?')) return;
        
        const newTasks = { ...tasks };
        delete newTasks[taskId];
        saveTasks(newTasks);
      };

      const startEditTask = (taskId) => {
        setEditingTask({ id: taskId, ...tasks[taskId] });
      };

      const saveEditTask = () => {
        if (!editingTask.label.trim()) {
          alert('Please enter a task name');
          return;
        }
        
        const newTasks = {
          ...tasks,
          [editingTask.id]: {
            ...tasks[editingTask.id],
            label: editingTask.label,
            type: editingTask.type,
            ...(editingTask.type === 'counter' ? { target: editingTask.target } : {})
          }
        };
        saveTasks(newTasks);
        setEditingTask(null);
      };

      const addPrize = () => {
        if (!newPrize.name.trim()) {
          alert('Please enter a prize name');
          return;
        }
        
        const prizeId = Math.max(...prizes.map(p => p.id), 0) + 1;
        const updatedPrizes = [...prizes, { id: prizeId, name: newPrize.name, cost: newPrize.cost }];
        savePrizes(updatedPrizes);
        setNewPrize({ name: '', cost: 1 });
        setShowAddPrize(false);
      };

      const deletePrize = (prizeId) => {
        if (!confirm('Delete this prize?')) return;
        
        const updatedPrizes = prizes.filter(p => p.id !== prizeId);
        savePrizes(updatedPrizes);
      };

      const startEditPrize = (prize) => {
        setEditingPrize({ ...prize });
      };

      const saveEditPrize = () => {
        if (!editingPrize.name.trim()) {
          alert('Please enter a prize name');
          return;
        }
        
        const updatedPrizes = prizes.map(p => 
          p.id === editingPrize.id ? editingPrize : p
        );
        savePrizes(updatedPrizes);
        setEditingPrize(null);
      };

      const stats = getCompletionRate();
      const perfect = isPerfectWeek();

      return (
        <div className="min-h-screen bg-gradient-to-b from-stone-100 via-neutral-50 to-stone-100 p-4 md:p-6">
          <div className="max-w-4xl mx-auto">
            {/* Header */}
            <header className="mb-6 pb-4 border-b-4 border-double border-neutral-800">
              <h1 className="text-3xl md:text-5xl font-serif font-normal text-neutral-900 mb-2 text-center tracking-tight">
                The Perfect Week
              </h1>
              <p className="text-neutral-700 italic text-center font-serif text-base md:text-lg">
                Your Weekly Progress Chronicle
              </p>
              <button
                onClick={() => setEditMode(!editMode)}
                className="mt-4 mx-auto block px-6 py-2 bg-neutral-900 text-neutral-100 font-serif hover:bg-neutral-800 transition-colors border-2 border-neutral-900 text-sm"
              >
                <span className="inline-flex items-center gap-2">
                  <Edit2 />
                  {editMode ? 'Finish Editing' : 'Edit Tasks'}
                </span>
              </button>
            </header>

            {/* Stats */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
              <div className="bg-white p-3 text-center border-t-2 border-b border-neutral-900">
                <div className="flex justify-center mb-1"><Award /></div>
                <div className="text-2xl md:text-4xl font-serif font-bold text-neutral-900">{weekData.perfectWeeks}</div>
                <div className="text-xs md:text-sm text-neutral-600 font-serif italic">Perfect Weeks</div>
              </div>

              <div className="bg-white p-3 text-center border-t-2 border-b border-neutral-900">
                <div className="flex justify-center mb-1"><TrendingUp /></div>
                <div className="text-2xl md:text-4xl font-serif font-bold text-neutral-900">{weekData.currentStreak}</div>
                <div className="text-xs md:text-sm text-neutral-600 font-serif italic">Current Streak</div>
              </div>

              <div className="bg-white p-3 text-center border-t-2 border-b border-neutral-900">
                <div className="flex justify-center mb-1"><Calendar /></div>
                <div className="text-2xl md:text-4xl font-serif font-bold text-neutral-900">{weekData.longestStreak}</div>
                <div className="text-xs md:text-sm text-neutral-600 font-serif italic">Longest Streak</div>
              </div>

              <div className="bg-white p-3 text-center border-t-2 border-b border-neutral-900">
                <div className="flex justify-center mb-1"><Gift /></div>
                <div className="text-2xl md:text-4xl font-serif font-bold text-neutral-900">{weekData.prizesEarned.length}</div>
                <div className="text-xs md:text-sm text-neutral-600 font-serif italic">Prizes Claimed</div>
              </div>
            </div>

            {/* Progress */}
            <div className="bg-white border-t-2 border-b border-neutral-900 p-4 md:p-6 mb-6">
              <div className="flex justify-between items-center mb-3">
                <h2 className="text-lg md:text-2xl font-serif font-bold text-neutral-900">This Week's Progress</h2>
                <span className="text-2xl md:text-3xl font-serif font-bold text-neutral-900">{stats.percentage}%</span>
              </div>
              
              <div className="w-full bg-neutral-200 h-5 md:h-6 mb-3 border-2 border-neutral-900">
                <div 
                  className={`h-full transition-all duration-500 ${perfect ? 'bg-neutral-900' : 'bg-neutral-600'}`}
                  style={{ width: `${stats.percentage}%` }}
                />
              </div>

              <div className="text-xs md:text-sm text-neutral-700 font-serif italic">
                {stats.completed} of {stats.total} tasks completed
                {perfect && <span className="ml-2 text-neutral-900 font-bold not-italic">★ PERFECT WEEK</span>}
              </div>
            </div>

            {/* Weekly Goal */}
            <div className="bg-neutral-50 border-t-2 border-b border-neutral-900 p-4 md:p-6 mb-6">
              <div className="flex justify-between items-start mb-3">
                <div className="flex items-center gap-2">
                  <Award />
                  <h2 className="text-base md:text-2xl font-serif font-bold text-neutral-900">Primary Objective</h2>
                </div>
                {!editMode && weekData.weeklyGoal && (
                  <button
                    onClick={() => saveWeekData({ ...weekData, weeklyGoalCompleted: !weekData.weeklyGoalCompleted })}
                    className={`w-7 h-7 border-2 flex items-center justify-center transition-all ${
                      weekData.weeklyGoalCompleted ? 'bg-neutral-900 border-neutral-900' : 'bg-white border-neutral-500'
                    }`}
                  >
                    {weekData.weeklyGoalCompleted && <Check />}
                  </button>
                )}
              </div>
              
              {editMode ? (
                <input
                  type="text"
                  value={weekData.weeklyGoal}
                  onChange={(e) => saveWeekData({ ...weekData, weeklyGoal: e.target.value })}
                  className="w-full p-2 border-2 border-neutral-400 focus:border-neutral-900 focus:outline-none text-sm md:text-base bg-white font-serif"
                  placeholder="Your big goal this week..."
                />
              ) : (
                <p className={`text-sm md:text-base font-serif ${weekData.weeklyGoalCompleted ? 'text-neutral-500 line-through' : 'text-neutral-900'}`}>
                  {weekData.weeklyGoal || 'Click "Edit Tasks" to set your primary objective'}
                </p>
              )}
              
              {weekData.weeklyGoal && !editMode && (
                <p className="text-xs text-neutral-600 mt-2 italic font-serif">
                  ★ Required for perfect week
                </p>
              )}
            </div>

            {/* Tasks */}
            <div className="bg-white border-t-2 border-b border-neutral-900 p-4 md:p-6 mb-6">
              <div className="flex justify-between items-center mb-4 pb-3 border-b border-neutral-300">
                <h2 className="text-base md:text-2xl font-serif font-bold text-neutral-900">Weekly Tasks</h2>
                {editMode && (
                  <button
                    onClick={() => setShowAddTask(true)}
                    className="px-3 py-1 bg-neutral-900 text-white hover:bg-neutral-800 text-xs font-serif border-2 border-neutral-900"
                  >
                    <span className="inline-flex items-center gap-1">
                      <Plus />
                      Add
                    </span>
                  </button>
                )}
              </div>
              
              <div className="space-y-2">
                {Object.entries(tasks).map(([id, task]) => (
                  <div 
                    key={id}
                    className={`flex items-center justify-between p-3 border-t border-b ${
                      task.completed ? 'bg-neutral-100 border-neutral-400' : 'bg-white border-neutral-300'
                    }`}
                  >
                    <div className="flex items-center gap-2 flex-1 min-w-0">
                      {task.type === 'checkbox' ? (
                        <button
                          onClick={() => !editMode && toggleTask(id)}
                          disabled={editMode}
                          className={`w-6 h-6 flex-shrink-0 border-2 flex items-center justify-center ${
                            task.completed ? 'bg-neutral-900 border-neutral-900' : 'bg-white border-neutral-600'
                          } ${editMode ? 'opacity-50' : ''}`}
                        >
                          {task.completed && <Check />}
                        </button>
                      ) : (
                        <div className="flex items-center gap-1 flex-shrink-0">
                          <button
                            onClick={() => !editMode && updateCounter(id, -1)}
                            disabled={editMode || task.current === 0}
                            className={`w-7 h-7 border-2 flex items-center justify-center bg-white border-neutral-600 font-bold text-sm ${
                              editMode || task.current === 0 ? 'opacity-50' : ''
                            }`}
                          >
                            -
                          </button>
                          <span className="font-bold font-serif text-neutral-900 text-xs md:text-base w-12 text-center">
                            {task.current}/{task.target}
                          </span>
                          <button
                            onClick={() => !editMode && updateCounter(id, 1)}
                            disabled={editMode || task.current >= task.target}
                            className={`w-7 h-7 border-2 flex items-center justify-center bg-white border-neutral-600 font-bold text-sm ${
                              editMode || task.current >= task.target ? 'opacity-50' : ''
                            }`}
                          >
                            +
                          </button>
                        </div>
                      )}
                      
                      <span className={`font-serif text-xs md:text-base truncate ${task.completed ? 'text-neutral-500 line-through' : 'text-neutral-900'}`}>
                        {task.label}
                      </span>
                    </div>

                    {editMode ? (
                      <div className="flex gap-1 flex-shrink-0">
                        <button
                          onClick={() => startEditTask(id)}
                          className="p-2 bg-neutral-200 text-neutral-900 border border-neutral-400"
                        >
                          <Edit2 />
                        </button>
                        <button
                          onClick={() => deleteTask(id)}
                          className="p-2 bg-neutral-200 text-neutral-900 border border-neutral-400"
                        >
                          <Trash2 />
                        </button>
                      </div>
                    ) : (
                      !task.completed && weekData.mulligansUsed < 1 && task.type === 'checkbox' && (
                        <button
                          onClick={() => useMulligan(id)}
                          className="text-xs px-2 py-1 bg-neutral-200 text-neutral-900 border border-neutral-400 font-serif flex-shrink-0"
                        >
                          Mulligan
                        </button>
                      )
                    )}
                  </div>
                ))}
              </div>

              <div className="mt-3 text-xs text-neutral-600 font-serif italic border-t border-neutral-300 pt-3">
                Mulligans used: {weekData.mulligansUsed} / 1
              </div>
            </div>

            {/* Actions */}
            <div className="flex flex-col sm:flex-row gap-3">
              <button
                onClick={completeWeek}
                className={`flex-1 py-3 font-bold font-serif text-sm md:text-base border-2 ${
                  perfect 
                    ? 'bg-neutral-900 text-white border-neutral-900' 
                    : 'bg-neutral-200 text-neutral-500 border-neutral-300 cursor-not-allowed'
                }`}
                disabled={!perfect}
              >
                {perfect ? '★ Complete & Reset' : 'Complete All Tasks'}
              </button>

              <button
                onClick={() => setShowPrizeModal(true)}
                className="px-4 py-3 bg-neutral-900 text-white font-bold font-serif border-2 border-neutral-900 text-sm md:text-base"
              >
                <span className="inline-flex items-center gap-2">
                  <Gift />
                  Prizes
                </span>
              </button>
            </div>

            {/* Prize Modal */}
            {showPrizeModal && (
              <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50">
                <div className="bg-white shadow-2xl max-w-md w-full p-4 md:p-6 border-4 border-neutral-900 max-h-[90vh] overflow-y-auto">
                  <div className="flex justify-between items-center mb-4 pb-3 border-b-2 border-neutral-900">
                    <h2 className="text-xl md:text-3xl font-serif font-bold text-neutral-900">Prize Shop</h2>
                    <div className="flex gap-2">
                      <button 
                        onClick={() => setEditPrizeMode(!editPrizeMode)}
                        className="text-neutral-600 hover:text-neutral-900"
                      >
                        <Edit2 />
                      </button>
                      <button 
                        onClick={() => setShowPrizeModal(false)}
                        className="text-neutral-600 hover:text-neutral-900"
                      >
                        <X />
                      </button>
                    </div>
                  </div>

                  <div className="mb-4 p-3 bg-neutral-100 border-2 border-neutral-900">
                    <p className="text-center text-sm md:text-base font-bold font-serif text-neutral-900">
                      Balance: {weekData.perfectWeeks} week{weekData.perfectWeeks !== 1 ? 's' : ''}
                    </p>
                  </div>

                  {editPrizeMode && (
                    <button
                      onClick={() => setShowAddPrize(true)}
                      className="w-full mb-3 py-2 bg-neutral-900 text-white font-serif text-sm border-2 border-neutral-900"
                    >
                      <span className="inline-flex items-center gap-1 justify-center">
                        <Plus />
                        Add Prize
                      </span>
                    </button>
                  )}

                  <div className="space-y-2 mb-4">
                    {prizes.map(prize => (
                      <div key={prize.id}>
                        {editPrizeMode ? (
                          <div className="flex items-center justify-between p-3 border-2 border-neutral-400 bg-white">
                            <span className="font-serif text-sm text-neutral-900 flex-1">{prize.name}</span>
                            <span className="text-xs font-bold font-serif text-neutral-900 mr-2">{prize.cost}w</span>
                            <div className="flex gap-1">
                              <button
                                onClick={() => startEditPrize(prize)}
                                className="p-2 bg-neutral-200 text-neutral-900 border border-neutral-400"
                              >
                                <Edit2 />
                              </button>
                              <button
                                onClick={() => deletePrize(prize.id)}
                                className="p-2 bg-neutral-200 text-neutral-900 border border-neutral-400"
                              >
                                <Trash2 />
                              </button>
                            </div>
                          </div>
                        ) : (
                          <label
                            className={`flex items-center justify-between p-3 border-2 cursor-pointer ${
                              selectedPrize === prize.id.toString()
                                ? 'bg-neutral-100 border-neutral-900'
                                : 'bg-white border-neutral-400'
                            }`}
                          >
                            <div className="flex items-center gap-2">
                              <input
                                type="radio"
                                name="prize"
                                value={prize.id}
                                checked={selectedPrize === prize.id.toString()}
                                onChange={(e) => setSelectedPrize(e.target.value)}
                                className="w-4 h-4"
                              />
                              <span className="font-serif text-sm text-neutral-900">{prize.name}</span>
                            </div>
                            <span className="text-xs font-bold font-serif text-neutral-900">
                              {prize.cost}w
                            </span>
                          </label>
                        )}
                      </div>
                    ))}
                  </div>

                  {!editPrizeMode && (
                    <button
                      onClick={claimPrize}
                      disabled={!selectedPrize}
                      className={`w-full py-3 font-bold font-serif text-base border-2 ${
                        selectedPrize
                          ? 'bg-neutral-900 text-white border-neutral-900'
                          : 'bg-neutral-300 text-neutral-500 border-neutral-300 cursor-not-allowed'
                      }`}
                    >
                      Claim Prize
                    </button>
                  )}

                  {weekData.prizesEarned.length > 0 && (
                    <div className="mt-4 pt-4 border-t-2 border-neutral-900">
                      <h3 className="font-bold font-serif text-neutral-900 mb-2 text-sm">Recent:</h3>
                      <div className="space-y-1">
                        {weekData.prizesEarned.slice(-3).reverse().map((prize, i) => (
                          <div key={i} className="text-xs text-neutral-700 font-serif">
                            • {prize.name}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Add Task Modal */}
            {showAddTask && (
              <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50">
                <div className="bg-white shadow-2xl max-w-md w-full p-4 md:p-6 border-4 border-neutral-900">
                  <div className="flex justify-between items-center mb-4 pb-3 border-b-2 border-neutral-900">
                    <h2 className="text-xl font-serif font-bold text-neutral-900">Add Task</h2>
                    <button 
                      onClick={() => setShowAddTask(false)}
                      className="text-neutral-600"
                    >
                      <X />
                    </button>
                  </div>

                  <div className="space-y-3">
                    <div>
                      <label className="block text-sm font-serif font-medium text-neutral-900 mb-2">Name</label>
                      <input
                        type="text"
                        value={newTask.label}
                        onChange={(e) => setNewTask({ ...newTask, label: e.target.value })}
                        className="w-full p-2 border-2 border-neutral-400 focus:border-neutral-900 focus:outline-none font-serif text-sm"
                        placeholder="Task name..."
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-serif font-medium text-neutral-900 mb-2">Type</label>
                      <select
                        value={newTask.type}
                        onChange={(e) => setNewTask({ ...newTask, type: e.target.value })}
                        className="w-full p-2 border-2 border-neutral-400 focus:border-neutral-900 focus:outline-none font-serif text-sm"
                      >
                        <option value="checkbox">Checkbox</option>
                        <option value="counter">Counter</option>
                      </select>
                    </div>

                    {newTask.type === 'counter' && (
                      <div>
                        <label className="block text-sm font-serif font-medium text-neutral-900 mb-2">Target</label>
                        <input
                          type="number"
                          min="1"
                          value={newTask.target}
                          onChange={(e) => setNewTask({ ...newTask, target: parseInt(e.target.value) || 1 })}
                          className="w-full p-2 border-2 border-neutral-400 focus:border-neutral-900 focus:outline-none font-serif text-sm"
                        />
                      </div>
                    )}

                    <button
                      onClick={addTask}
                      className="w-full py-2 bg-neutral-900 text-white font-serif font-bold border-2 border-neutral-900 text-sm"
                    >
                      Add Task
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Edit Task Modal */}
            {editingTask && (
              <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50">
                <div className="bg-white shadow-2xl max-w-md w-full p-4 md:p-6 border-4 border-neutral-900">
                  <div className="flex justify-between items-center mb-4 pb-3 border-b-2 border-neutral-900">
                    <h2 className="text-xl font-serif font-bold text-neutral-900">Edit Task</h2>
                    <button 
                      onClick={() => setEditingTask(null)}
                      className="text-neutral-600"
                    >
                      <X />
                    </button>
                  </div>

                  <div className="space-y-3">
                    <div>
                      <label className="block text-sm font-serif font-medium text-neutral-900 mb-2">Name</label>
                      <input
                        type="text"
                        value={editingTask.label}
                        onChange={(e) => setEditingTask({ ...editingTask, label: e.target.value })}
                        className="w-full p-2 border-2 border-neutral-400 focus:border-neutral-900 focus:outline-none font-serif text-sm"
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-serif font-medium text-neutral-900 mb-2">Type</label>
                      <select
                        value={editingTask.type}
                        onChange={(e) => setEditingTask({ ...editingTask, type: e.target.value })}
                        className="w-full p-2 border-2 border-neutral-400 focus:border-neutral-900 focus:outline-none font-serif text-sm"
                      >
                        <option value="checkbox">Checkbox</option>
                        <option value="counter">Counter</option>
                      </select>
                    </div>

                    {editingTask.type === 'counter' && (
                      <div>
                        <label className="block text-sm font-serif font-medium text-neutral-900 mb-2">Target</label>
                        <input
                          type="number"
                          min="1"
                          value={editingTask.target}
                          onChange={(e) => setEditingTask({ ...editingTask, target: parseInt(e.target.value) || 1 })}
                          className="w-full p-2 border-2 border-neutral-400 focus:border-neutral-900 focus:outline-none font-serif text-sm"
                        />
                      </div>
                    )}

                    <button
                      onClick={saveEditTask}
                      className="w-full py-2 bg-neutral-900 text-white font-serif font-bold border-2 border-neutral-900 text-sm"
                    >
                      Save Changes
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Add Prize Modal */}
            {showAddPrize && (
              <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50">
                <div className="bg-white shadow-2xl max-w-md w-full p-4 md:p-6 border-4 border-neutral-900">
                  <div className="flex justify-between items-center mb-4 pb-3 border-b-2 border-neutral-900">
                    <h2 className="text-xl font-serif font-bold text-neutral-900">Add Prize</h2>
                    <button 
                      onClick={() => setShowAddPrize(false)}
                      className="text-neutral-600"
                    >
                      <X />
                    </button>
                  </div>

                  <div className="space-y-3">
                    <div>
                      <label className="block text-sm font-serif font-medium text-neutral-900 mb-2">Prize Name</label>
                      <input
                        type="text"
                        value={newPrize.name}
                        onChange={(e) => setNewPrize({ ...newPrize, name: e.target.value })}
                        className="w-full p-2 border-2 border-neutral-400 focus:border-neutral-900 focus:outline-none font-serif text-sm"
                        placeholder="e.g., Concert ticket"
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-serif font-medium text-neutral-900 mb-2">Cost (weeks)</label>
                      <input
                        type="number"
                        min="1"
                        value={newPrize.cost}
                        onChange={(e) => setNewPrize({ ...newPrize, cost: parseInt(e.target.value) || 1 })}
                        className="w-full p-2 border-2 border-neutral-400 focus:border-neutral-900 focus:outline-none font-serif text-sm"
                      />
                    </div>

                    <button
                      onClick={addPrize}
                      className="w-full py-2 bg-neutral-900 text-white font-serif font-bold border-2 border-neutral-900 text-sm"
                    >
                      Add Prize
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Edit Prize Modal */}
            {editingPrize && (
              <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50">
                <div className="bg-white shadow-2xl max-w-md w-full p-4 md:p-6 border-4 border-neutral-900">
                  <div className="flex justify-between items-center mb-4 pb-3 border-b-2 border-neutral-900">
                    <h2 className="text-xl font-serif font-bold text-neutral-900">Edit Prize</h2>
                    <button 
                      onClick={() => setEditingPrize(null)}
                      className="text-neutral-600"
                    >
                      <X />
                    </button>
                  </div>

                  <div className="space-y-3">
                    <div>
                      <label className="block text-sm font-serif font-medium text-neutral-900 mb-2">Prize Name</label>
                      <input
                        type="text"
                        value={editingPrize.name}
                        onChange={(e) => setEditingPrize({ ...editingPrize, name: e.target.value })}
                        className="w-full p-2 border-2 border-neutral-400 focus:border-neutral-900 focus:outline-none font-serif text-sm"
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-serif font-medium text-neutral-900 mb-2">Cost (weeks)</label>
                      <input
                        type="number"
                        min="1"
                        value={editingPrize.cost}
                        onChange={(e) => setEditingPrize({ ...editingPrize, cost: parseInt(e.target.value) || 1 })}
                        className="w-full p-2 border-2 border-neutral-400 focus:border-neutral-900 focus:outline-none font-serif text-sm"
                      />
                    </div>

                    <button
                      onClick={saveEditPrize}
                      className="w-full py-2 bg-neutral-900 text-white font-serif font-bold border-2 border-neutral-900 text-sm"
                    >
                      Save Changes
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<PerfectWeekTracker />, document.getElementById('root'));
  </script>
</body>
</html>
